services:
  smarttender_db:
    image: postgres:16-alpine
    container_name: smarttender_db
    environment:
      POSTGRES_USER: smarttender
      POSTGRES_PASSWORD: smarttender_pass
      POSTGRES_DB: smarttender
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smarttender"]
      interval: 10s
      timeout: 5s
      retries: 5

  smarttender_redis:
    image: redis:7-alpine
    container_name: smarttender_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Опционал: docker compose --profile minio up -d  (USE_MINIO=true)
  smarttender_minio:
    profiles: ["minio"]
    image: minio/minio:latest
    container_name: smarttender_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  smarttender_frontend:
    build: ./frontend
    container_name: smarttender_frontend
    ports:
      - "3000:80"
    restart: unless-stopped
    depends_on:
      smarttender_api:
        condition: service_healthy

  smarttender_api:
    build: .
    container_name: smarttender_api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://smarttender:smarttender_pass@smarttender_db:5432/smarttender
      REDIS_URL: redis://smarttender_redis:6379/0
      SECRET_KEY: your-secret-key-change-in-production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 15
      REFRESH_TOKEN_EXPIRE_DAYS: 30
      APP_PUBLIC_URL: http://localhost:8000
      UPLOAD_DIR: uploads
      USE_MINIO: "false"
      MINIO_ENDPOINT: smarttender_minio:9000
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      smarttender_db:
        condition: service_healthy
      smarttender_redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  smarttender_worker:
    build: .
    container_name: smarttender_worker
    command: celery -A app.tasks.celery_app worker --loglevel=info
    environment:
      DATABASE_URL: postgresql://smarttender:smarttender_pass@smarttender_db:5432/smarttender
      REDIS_URL: redis://smarttender_redis:6379/0
      SECRET_KEY: your-secret-key-change-in-production
      UPLOAD_DIR: uploads
    depends_on:
      smarttender_db:
        condition: service_healthy
      smarttender_redis:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads

  smarttender_beat:
    build: .
    container_name: smarttender_beat
    command: celery -A app.tasks.celery_app beat --loglevel=info
    environment:
      DATABASE_URL: postgresql://smarttender:smarttender_pass@smarttender_db:5432/smarttender
      REDIS_URL: redis://smarttender_redis:6379/0
    depends_on:
      smarttender_redis:
        condition: service_healthy

volumes:
  postgres_data:
  minio_data:
  uploads_data:
