services:
  smarttender_db:
    image: postgres:16-alpine
    container_name: smarttender_db
    environment:
      POSTGRES_USER: smarttender
      POSTGRES_PASSWORD: smarttender_pass
      POSTGRES_DB: smarttender
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smarttender"]
      interval: 10s
      timeout: 5s
      retries: 5

  smarttender_redis:
    image: redis:7-alpine
    container_name: smarttender_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  smarttender_api:
    build: .
    container_name: smarttender_api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://smarttender:smarttender_pass@smarttender_db:5432/smarttender
      REDIS_URL: redis://smarttender_redis:6379/0
      SECRET_KEY: your-secret-key-change-in-production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 15
      REFRESH_TOKEN_EXPIRE_DAYS: 30
    depends_on:
      smarttender_db:
        condition: service_healthy
      smarttender_redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # 3-аптадан кейін: docker compose --profile celery up -d
  smarttender_worker:
    profiles: ["celery"]
    build: .
    container_name: smarttender_worker
    command: celery -A app.tasks.celery_app worker --loglevel=info
    environment:
      DATABASE_URL: postgresql://smarttender:smarttender_pass@smarttender_db:5432/smarttender
      REDIS_URL: redis://smarttender_redis:6379/0
      SECRET_KEY: your-secret-key-change-in-production
      ALGORITHM: HS256
    depends_on:
      smarttender_db:
        condition: service_healthy
      smarttender_redis:
        condition: service_healthy
    volumes:
      - .:/app

  smarttender_beat:
    profiles: ["celery"]
    build: .
    container_name: smarttender_beat
    command: celery -A app.tasks.celery_app beat --loglevel=info
    environment:
      DATABASE_URL: postgresql://smarttender:smarttender_pass@smarttender_db:5432/smarttender
      REDIS_URL: redis://smarttender_redis:6379/0
    depends_on:
      smarttender_db:
        condition: service_healthy
      smarttender_redis:
        condition: service_healthy
    volumes:
      - .:/app

volumes:
  postgres_data:
